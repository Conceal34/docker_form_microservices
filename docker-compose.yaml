version: '3.6'

services:
  backend:
    build: ./backend
    hostname: backend-host
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    networks:
      - app-network
  frontend:
    build: ./frontend
    hostname: frontend-host
    environment:
      - BACKEND_URL=http://backend-host:5000
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    links: 
      - backend
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network: {}